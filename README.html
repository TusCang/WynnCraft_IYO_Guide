<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黎明餐館 | Lumina Bistro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-grey: #5f6368;
            --surface: #ffffff;
            --background: #f8f9fa;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--background);
            color: #202124;
            margin: 0;
            line-height: 1.6;
        }
        nav {
            background: var(--surface);
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 32px;
            box-shadow: inset 0 -1px 0 0 #dadce0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-weight: 700; font-size: 22px; color: var(--google-blue); margin-right: 48px; }
        nav a {
            text-decoration: none;
            color: var(--google-grey);
            font-weight: 500;
            margin-right: 24px;
            font-size: 14px;
            transition: color 0.2s;
        }
        nav a:hover { color: var(--google-blue); }
        
        .hero {
            max-width: 900px;
            margin: 80px auto;
            text-align: center;
            padding: 0 20px;
        }
        h1 { font-size: 48px; font-weight: 500; margin-bottom: 16px; letter-spacing: -0.5px; }
        .subtitle { font-size: 18px; color: var(--google-grey); margin-bottom: 40px; }
        
        .card {
            background: var(--surface);
            border: 1px solid #dadce0;
            border-radius: 24px;
            padding: 40px;
            transition: box-shadow 0.3s ease;
            max-width: 500px;
            margin: 0 auto;
        }
        .card:hover { box-shadow: 0 1px 3px 0 rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15); }
        
        .btn {
            display: inline-block;
            background: var(--google-blue);
            color: white;
            padding: 12px 32px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Lumina Bistro</div>
        <a href="index.html">首頁</a>
        <a href="survey.html">滿意度調查</a>
    </nav>
    <div class="hero">
        <h1>品味，不期而遇</h1>
        <p class="subtitle">歡迎來到黎明餐館。我們深信每一道料理都有它的靈魂。</p>
        <div class="card">
            <h3 style="margin-top:0">您的意見很重要</h3>
            <p>點擊下方按鈕，填寫我們的餐廳調查表，您的每一份建議都會同步至我們的雲端系統。</p>
            <a href="survey.html" class="btn">立即填寫單據</a>
        </div>
    </div>
</body>
</html>
